<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="content">
  <h2>Orders</h2>
  <div id="orders"></div>
</div>

<script>
fetch("http://localhost:5000/api/orders")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("orders");

  data.forEach(order => {
    const div = document.createElement("div");
    div.innerHTML = `
      <p><b>${order.name}</b> ordered ${order.items.length} items</p>
      <hr>
    `;
    container.appendChild(div);
  });
});
</script>

</body>
</html>
